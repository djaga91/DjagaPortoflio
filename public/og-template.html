<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortfoliA - Official OG Card</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body>

  <div class="relative w-[1200px] h-[630px] bg-[#0f172b] overflow-hidden flex flex-col items-center justify-center border border-[#1e293b] shadow-2xl">

    <div class="absolute top-[-150px] left-1/2 -translate-x-1/2 w-[600px] h-[500px] bg-[#f0661b] opacity-20 blur-[140px] rounded-full pointer-events-none"></div>

    <div class="absolute bottom-[-100px] right-[-50px] w-[500px] h-[500px] bg-[#8b5cf6] opacity-15 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="absolute inset-0 z-0 opacity-40"
         style="background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px); background-size: 50px 50px; background-position: center;">
    </div>

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#0f172b_90%)] pointer-events-none"></div>

    <div class="relative z-10 flex flex-col items-center text-center px-8">

      <div class="mb-8 relative group">
        <div class="absolute inset-0 bg-[#f0661b] blur-2xl opacity-20 rounded-full"></div>
        <img src="logo.svg" alt="PortfoliA" class="relative h-28 w-auto drop-shadow-2xl transform transition hover:scale-105 duration-500" />
      </div>

      <h1 class="text-7xl font-extrabold text-white mb-6 leading-[1.1] tracking-tight drop-shadow-lg">
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-[#fae2be] to-white">
          Soyez plus qu'un simple CV.
        </span>
      </h1>

      <p class="text-2xl text-slate-400 font-medium max-w-3xl leading-relaxed">
        CV, Portfolio, Lettres : générez toute votre identité pro<br/>
        <span class="text-slate-300">en un clic.</span>
      </p>

    </div>

    <div class="absolute bottom-12 flex flex-col items-center z-10">
      <div class="w-16 h-1 bg-gradient-to-r from-[#f0661b] to-[#8b5cf6] rounded-full mb-4 opacity-80"></div>
      <p class="text-[#fae2be] font-bold tracking-[0.3em] text-sm uppercase opacity-80">
        portfolia.fr
      </p>
    </div>

  </div>

</body>
</html>
