<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortfoliA - LinkedIn Banner</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body>

  <!-- LinkedIn Banner : 1584x396 pixels -->
  <div class="relative w-[1584px] h-[396px] bg-[#0f172b] overflow-hidden flex items-center justify-end">

    <!-- Gradient orange (gauche) -->
    <div class="absolute top-[50px] left-[-100px] w-[500px] h-[400px] bg-[#f0661b] opacity-20 blur-[140px] rounded-full pointer-events-none"></div>

    <!-- Gradient violet (droite) -->
    <div class="absolute top-[-50px] right-[-100px] w-[600px] h-[500px] bg-[#8b5cf6] opacity-15 blur-[120px] rounded-full pointer-events-none"></div>

    <!-- Grille de fond -->
    <div class="absolute inset-0 z-0 opacity-30"
         style="background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px); background-size: 50px 50px; background-position: center;">
    </div>

    <!-- Vignette radiale -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#0f172b_90%)] pointer-events-none"></div>

    <!-- Zone de sécurité pour le logo LinkedIn (bas gauche) -->
    <!-- Le logo LinkedIn prend environ 170x170px en bas à gauche, on évite cette zone -->

    <!-- Contenu principal (centré avec espace pour le logo de profil) -->
    <div class="relative z-10 flex items-center justify-center w-full px-64">

      <!-- Texte principal -->
      <div class="flex flex-col items-center text-center">
        <h1 class="text-7xl font-extrabold text-white mb-4 leading-[1.1] tracking-tight drop-shadow-lg">
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-[#fae2be] to-white">
            Soyez plus qu'un simple CV.
          </span>
        </h1>

        <p class="text-2xl text-slate-400 font-medium leading-relaxed mb-5">
          CV, Portfolio, Lettres : générez toute votre identité pro en un clic.
        </p>

        <!-- URL du site -->
        <div class="flex items-center gap-3">
          <div class="w-16 h-1 bg-gradient-to-r from-[#f0661b] to-[#8b5cf6] rounded-full opacity-80"></div>
          <p class="text-[#fae2be] font-bold tracking-[0.25em] text-base uppercase opacity-90">
            portfolia.fr
          </p>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
