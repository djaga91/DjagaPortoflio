<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortfoliA - Fond Caméra</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body>

  <!-- Fond caméra 1920x1080 (16:9) -->
  <div class="relative w-[1920px] h-[1080px] bg-[#0f172b] overflow-hidden flex flex-col items-center justify-center">

    <!-- Effets de fond subtils -->
    <div class="absolute top-[-150px] left-1/2 -translate-x-1/2 w-[800px] h-[600px] bg-[#f0661b] opacity-8 blur-[140px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-[-100px] left-[-100px] w-[700px] h-[700px] bg-[#8b5cf6] opacity-8 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-[-100px] right-[-100px] w-[700px] h-[700px] bg-[#6366f1] opacity-6 blur-[120px] rounded-full pointer-events-none"></div>

    <!-- Grille très subtile -->
    <div class="absolute inset-0 z-0 opacity-15"
         style="background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px); background-size: 80px 80px; background-position: center;">
    </div>

    <!-- Vignette radiale -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#0f172b_92%)] pointer-events-none"></div>

    <!-- Logo en bas à droite (discret) -->
    <div class="absolute bottom-12 right-12 z-10">
      <div class="relative group">
        <div class="absolute inset-0 bg-[#f0661b] blur-2xl opacity-15 rounded-full"></div>
        <img src="../logo.svg" alt="PortfoliA" class="relative h-20 w-auto opacity-60 drop-shadow-xl" />
      </div>
    </div>

    <!-- Texte en bas à gauche (optionnel) -->
    <div class="absolute bottom-12 left-12 z-10">
      <p class="text-[#fae2be] font-bold tracking-[0.3em] text-lg uppercase opacity-40">
        portfolia.fr
      </p>
    </div>

  </div>

</body>
</html>
