<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCKRent - Transformation Digitale</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }

    .slide {
      display: none;
      width: 100vw;
      height: 100vh;
    }

    .slide.active {
      display: block;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .btn {
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid rgba(240, 102, 27, 0.5);
      color: white;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
      backdrop-filter: blur(10px);
    }

    .btn:hover {
      background: rgba(240, 102, 27, 0.3);
      border-color: #f0661b;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(240, 102, 27, 0.3);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn:disabled:hover {
      transform: none;
      box-shadow: none;
      background: rgba(30, 41, 59, 0.95);
    }

    .progress {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: rgba(30, 41, 59, 0.95);
      border-radius: 12px;
      border: 1px solid rgba(240, 102, 27, 0.3);
      backdrop-filter: blur(10px);
    }

    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(148, 163, 184, 0.3);
      transition: all 0.3s;
      cursor: pointer;
    }

    .progress-dot.active {
      background: #f0661b;
      box-shadow: 0 0 15px rgba(240, 102, 27, 0.6);
      transform: scale(1.3);
    }

    .progress-dot:hover {
      background: rgba(240, 102, 27, 0.6);
    }

    .slide-number {
      position: fixed;
      top: 40px;
      right: 40px;
      z-index: 9999;
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid rgba(240, 102, 27, 0.3);
      padding: 12px 24px;
      border-radius: 12px;
      color: #fae2be;
      font-weight: bold;
      font-size: 18px;
      backdrop-filter: blur(10px);
    }

    .slide-title {
      position: fixed;
      top: 40px;
      left: 40px;
      z-index: 9999;
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid rgba(240, 102, 27, 0.3);
      padding: 12px 24px;
      border-radius: 12px;
      color: #fae2be;
      font-weight: 600;
      font-size: 16px;
      backdrop-filter: blur(10px);
      max-width: 400px;
    }
  </style>
</head>
<body>

  <!-- Indicateur de slide -->
  <div class="slide-number" id="slideNumber">
    <span id="currentSlide">1</span> / 10
  </div>

  <!-- Titre de la slide -->
  <div class="slide-title" id="slideTitle">Titre & Introduction</div>

  <!-- Slides -->
  <div class="slide active" id="slide-1">
    <iframe src="slide-ockrent-1.html"></iframe>
  </div>

  <div class="slide" id="slide-2">
    <iframe src="slide-ockrent-2.html"></iframe>
  </div>

  <div class="slide" id="slide-3">
    <iframe src="slide-ockrent-3.html"></iframe>
  </div>

  <div class="slide" id="slide-4">
    <iframe src="slide-ockrent-4.html"></iframe>
  </div>

  <div class="slide" id="slide-5">
    <iframe src="slide-ockrent-5.html"></iframe>
  </div>

  <div class="slide" id="slide-6">
    <iframe src="slide-ockrent-6.html"></iframe>
  </div>

  <div class="slide" id="slide-7">
    <iframe src="slide-ockrent-7.html"></iframe>
  </div>

  <div class="slide" id="slide-8">
    <iframe src="slide-ockrent-8.html"></iframe>
  </div>

  <div class="slide" id="slide-9">
    <iframe src="slide-ockrent-9.html"></iframe>
  </div>

  <div class="slide" id="slide-10">
    <iframe src="slide-ockrent-10.html"></iframe>
  </div>

  <!-- Contrôles de navigation -->
  <div class="controls">
    <button class="btn" id="prevBtn" onclick="previousSlide()" disabled>
      ← Précédent
    </button>

    <div class="progress">
      <div class="progress-dot active" onclick="goToSlide(1)"></div>
      <div class="progress-dot" onclick="goToSlide(2)"></div>
      <div class="progress-dot" onclick="goToSlide(3)"></div>
      <div class="progress-dot" onclick="goToSlide(4)"></div>
      <div class="progress-dot" onclick="goToSlide(5)"></div>
      <div class="progress-dot" onclick="goToSlide(6)"></div>
      <div class="progress-dot" onclick="goToSlide(7)"></div>
      <div class="progress-dot" onclick="goToSlide(8)"></div>
      <div class="progress-dot" onclick="goToSlide(9)"></div>
      <div class="progress-dot" onclick="goToSlide(10)"></div>
    </div>

    <button class="btn" id="nextBtn" onclick="nextSlide()">
      Suivant →
    </button>
  </div>

  <script>
    let currentSlide = 1;
    const totalSlides = 10;

    // Titres des slides
    const slideTitles = [
      "Titre & Introduction",
      "Le Constat - L'urgence d'une transition",
      "Notre Vision - La Roadmap 18 Mois",
      "La Gouvernance - Culture au service de la donnée",
      "L'Architecture Cible - Le Data Lake Unifié",
      "Le Cœur du Réacteur - Les 4 Référentiels Maîtres",
      "Cas d'usage - Maximisation du Revenu (Business)",
      "Cas d'usage - Efficacité Opérationnelle et Risk",
      "Qualité & Sécurité - Les garde-fous essentiels",
      "Conclusion & Prochaines Étapes"
    ];

    function updateSlide() {
      // Masquer toutes les slides
      document.querySelectorAll('.slide').forEach(slide => {
        slide.classList.remove('active');
      });

      // Afficher la slide actuelle
      document.getElementById(`slide-${currentSlide}`).classList.add('active');

      // Mettre à jour le numéro
      document.getElementById('currentSlide').textContent = currentSlide;

      // Mettre à jour le titre
      document.getElementById('slideTitle').textContent = slideTitles[currentSlide - 1];

      // Mettre à jour les points de progression
      document.querySelectorAll('.progress-dot').forEach((dot, index) => {
        if (index + 1 === currentSlide) {
          dot.classList.add('active');
        } else {
          dot.classList.remove('active');
        }
      });

      // Gérer les boutons
      document.getElementById('prevBtn').disabled = currentSlide === 1;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides;
    }

    function nextSlide() {
      if (currentSlide < totalSlides) {
        currentSlide++;
        updateSlide();
      }
    }

    function previousSlide() {
      if (currentSlide > 1) {
        currentSlide--;
        updateSlide();
      }
    }

    function goToSlide(slideNumber) {
      if (slideNumber >= 1 && slideNumber <= totalSlides) {
        currentSlide = slideNumber;
        updateSlide();
      }
    }

    // Navigation clavier
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        previousSlide();
      } else if (e.key >= '0' && e.key <= '9') {
        e.preventDefault();
        const slideNum = parseInt(e.key);
        if (slideNum === 0) {
          goToSlide(10);
        } else if (slideNum <= totalSlides) {
          goToSlide(slideNum);
        }
      }
    });

    // Initialiser
    updateSlide();
  </script>

</body>
</html>
