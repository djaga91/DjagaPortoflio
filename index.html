<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-saiyan.png" />
    <link rel="apple-touch-icon" href="/favicon-saiyan.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Djagoat" />

    <!-- SEO Meta Tags -->
    <title>Portfolio Djagoat — Ingénieur</title>
    <meta name="description" content="Portfolio professionnel de Djagoat, Ingénieur spécialisé en Cybersécurité, DevSecOps et Gouvernance (GRC)." />
    <meta name="keywords" content="portfolio, ingénieur, cybersécurité, devsecops, grc, gouvernance, cloud, IA, Djagoat" />
    <meta name="author" content="Djagoat" />
    <meta name="robots" content="index, follow" />

    <!-- Fonts: Inter (principale), Playfair Display (titres portfolio), Space Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Theme initialization script - Prevents flash of wrong theme -->
    <script>
      (function() {
        const stored = localStorage.getItem('portfolia-theme');
        let theme = stored || 'system';

        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#0F172A');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
